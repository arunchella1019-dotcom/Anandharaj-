<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freshcart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#1b8f3c;
    color:white;
    text-align:center;
    padding:30px;
}

section{
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1b8f3c;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

footer{
    background:#1b8f3c;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Freshcart</h1>
<p>Fresh Vegetables & Fruits Delivered</p>
</header>

<section>
<h2>Our Products</h2>

<div class="services">
<div class="box">
<h3>🥬 Vegetables</h3>
<p>Fresh vegetables every day.</p>
</div>

<div class="box">
<h3>🍎 Fruits</h3>
<p>Seasonal fresh fruits.</p>
</div>

<div class="box">
<h3>🥛 Dairy</h3>
<p>Milk, Curd & Butter.</p>
</div>

<div class="box">
<h3>🚚 Delivery</h3>
<p>Fast Home Delivery.</p>
</div>
</div>
</section>

<footer>
© 2026 Freshcart. All Rights Reserved.
</footer>

</body>
</html>
